<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブログ管理画面｜吉塚 ごえん</title>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    const observer = new MutationObserver(() => {
      if (document.getElementById('custom-add-btn')) return;
      const addBtn = [...document.querySelectorAll('button')].filter(b =>
        b.textContent.trim() === 'Add item' || b.textContent.trim() === '追加'
      ).at(-1);
      if (!addBtn) return;

      const fab = document.createElement('button');
      fab.id = 'custom-add-btn';
      fab.textContent = '＋ 新規投稿を追加';
      fab.style.cssText = [
        'position:fixed', 'top:14px', 'left:50%', 'transform:translateX(-50%)',
        'z-index:99999', 'background:#1a4d6e', 'color:#fff',
        'border:none', 'padding:8px 24px', 'border-radius:6px',
        'cursor:pointer', 'font-size:14px', 'font-weight:bold',
        'box-shadow:0 2px 8px rgba(0,0,0,0.3)'
      ].join(';');
      fab.onclick = () => {
        const target = [...document.querySelectorAll('button')].filter(
          b => b !== fab && (b.textContent.trim() === 'Add item' || b.textContent.trim() === '追加')
        ).at(-1);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => target.click(), 300);
        }
      };
      document.body.appendChild(fab);
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
