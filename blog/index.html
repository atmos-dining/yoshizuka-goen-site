<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブログ・お知らせ｜吉塚 ごえん</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="吉塚 ごえんのブログ・お知らせ一覧。最新情報や来店前に役立つ情報を更新しています。">
<link rel="icon" href="../images/yoshizukagoen_favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<meta property="og:type" content="website">
<meta property="og:site_name" content="吉塚 ごえん">
<meta property="og:title" content="ブログ・お知らせ｜吉塚 ごえん">
<meta property="og:description" content="吉塚 ごえんの最新情報やおすすめ情報を発信しています。">
<meta property="og:url" content="https://yoshizuka-goen.com/blog/">
<meta property="og:image" content="https://yoshizuka-goen.com/images/hero-goen.jpg">
<link rel="canonical" href="https://yoshizuka-goen.com/blog/">

<!-- 構造化データ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "ホーム", "item": "https://yoshizuka-goen.com/"},
    {"@type": "ListItem", "position": 2, "name": "ブログ・お知らせ", "item": "https://yoshizuka-goen.com/blog/"}
  ]
}
</script>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EHQF1C3M8V"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-EHQF1C3M8V');

</head>

<body data-page="blog">
<div id="top"></div>
<div id="shared-header"></div>

<main id="main">

  <section class="section is-inview page-head" style="padding-top: calc(var(--header-h) + 16px) !important;">
    <div class="section-inner">
      <h1 class="page-title">ブログ・お知らせ</h1>
      <p class="page-lead">最新のメニュー情報・宴会案内・キャンペーンなど、<br>来店前に役立つ情報を発信しています。</p>
    </div>
  </section>

  <section class="section is-inview">
    <div class="section-inner">
      <div id="blogList" class="blog-grid"></div>
      <p id="blogStatus" style="margin-top:14px; opacity:.75;"></p>
    </div>
  </section>

  <div id="shared-bottom"></div>
  <a href="#top" class="page-top" aria-label="ページの先頭へ"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></a>

</main>

<script src="../common.js"></script>
<script>
(async () => {
  const listEl   = document.getElementById('blogList');
  const statusEl = document.getElementById('blogStatus');

  function esc(s) {
    return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;');
  }
  function fmtDate(d) {
    const m = String(d || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}.${m[2]}.${m[3]}` : esc(d || '');
  }

  try {
    if (statusEl) statusEl.textContent = '読み込み中…';

    const res = await fetch('./posts.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('posts.jsonが読み込めません（' + res.status + '）');
    const posts = (await res.json()).posts;
    if (!Array.isArray(posts)) throw new Error('posts.jsonの形式が不正です');

    posts.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));

    if (posts.length === 0) {
      if (statusEl) statusEl.textContent = 'まだ記事がありません。';
      return;
    }

    listEl.innerHTML = posts.map(p => {
      const href = `./posts/post?slug=${encodeURIComponent(p.slug)}`;
      const bg = p.image ? `style="background-image:url('${esc(p.image)}');"` : '';
      return `
        <article class="blog-card">
          <a href="${href}">
            <div class="blog-image" ${bg}></div>
            <div class="blog-body">
              <time class="blog-date" datetime="${esc(p.date)}">${fmtDate(p.date)}</time>
              <h3 class="blog-title">${esc(p.title)}</h3>
              <p class="blog-excerpt">${esc(p.excerpt)}</p>
            </div>
          </a>
        </article>`;
    }).join('');

    if (statusEl) statusEl.textContent = '';

  } catch(e) {
    if (statusEl) statusEl.textContent = 'エラー：' + (e?.message || e);
    console.error(e);
  }
})();
</script>

</body>
</html>
