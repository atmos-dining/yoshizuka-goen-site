<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブログ｜吉塚 ごえん</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="吉塚 ごえんのブログ記事。">
<link rel="icon" href="../../images/yoshizukagoen_favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<style>
  .post-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }
  .post-breadcrumb {
    font-size: 13px;
    opacity: .75;
    margin-bottom: 20px;
  }
  .post-breadcrumb a {
    text-decoration: underline;
    color: inherit;
  }
  .post-breadcrumb span { opacity: .6; margin: 0 4px; }
  .post-date {
    font-size: 13px;
    opacity: .7;
    margin-bottom: 8px;
  }
  .post-title {
    font-size: clamp(20px, 4vw, 30px);
    line-height: 1.4;
    margin: 0 0 20px;
  }
  .post-hero {
    width: 100%;
    max-width: 860px;
    border-radius: 4px;
    aspect-ratio: 16/9;
    object-fit: cover;
    margin-bottom: 28px;
    display: block;
  }
  .post-body {
    line-height: 1.95;
    font-size: 16px;
  }
  .post-body p { margin: 0 0 1.4em; }
  .post-footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,.12);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .post-footer a {
    text-decoration: underline;
    color: var(--primary);
    font-size: 14px;
  }
  .post-footer span { opacity: .4; }
  .post-loading {
    text-align: center;
    padding: 80px 20px;
    opacity: .6;
  }
</style>
<meta property="og:type" content="article">
<meta property="og:site_name" content="吉塚 ごえん">
<meta property="og:title" content="ブログ｜吉塚 ごえん">
<meta property="og:description" content="吉塚 ごえんのブログ記事。">
<meta property="og:url" content="https://yoshizuka-goen.com/blog/">
<meta property="og:image" content="https://yoshizuka-goen.com/images/hero-goen.jpg">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
</script>
</head>

<body data-page="blog">
<div id="top"></div>
<div id="shared-header"></div>

<main id="main">
  <div class="post-wrap">
    <nav class="post-breadcrumb">
      <a href="../../">トップ</a>
      <span>/</span>
      <a href="../">ブログ・お知らせ</a>
      <span>/</span>
      <span id="bc-title">記事</span>
    </nav>

    <div id="post-content">
      <p class="post-loading">読み込み中…</p>
    </div>
  </div>

  <div id="shared-bottom"></div>
  <a href="#top" class="page-top" aria-label="ページの先頭へ"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></a>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="../../common.js"></script>
<script>
(async () => {
  const params    = new URLSearchParams(location.search);
  const slug      = params.get('slug') || '';
  const contentEl = document.getElementById('post-content');
  const bcTitle   = document.getElementById('bc-title');

  function esc(s) {
    return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;');
  }
  function fmtDate(d) {
    const m = String(d || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}.${m[2]}.${m[3]}` : esc(d || '');
  }

  if (!slug) {
    contentEl.innerHTML = '<p>記事が見つかりませんでした。<br><a href="../" style="text-decoration:underline">ブログ一覧へ</a></p>';
    return;
  }

  try {
    const res = await fetch('../posts.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('posts.json 読み込みエラー');
    const posts = (await res.json()).posts;

    const post = posts.find(p => p.slug === slug);
    if (!post) throw new Error('記事が見つかりません: ' + slug);

    document.title = `${post.title}｜吉塚 ごえん`;
    const pageUrl = `https://yoshizuka-goen.com/blog/posts/post?slug=${encodeURIComponent(slug)}`;
    document.querySelector('meta[name="description"]')?.setAttribute('content', post.excerpt || '');
    document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${post.title}｜吉塚 ごえん`);
    document.querySelector('meta[property="og:description"]')?.setAttribute('content', post.excerpt || '');
    document.querySelector('meta[property="og:url"]')?.setAttribute('content', pageUrl);
    if (bcTitle) bcTitle.textContent = post.title;

    let imgSrc = '';
    if (post.image) {
      imgSrc = post.image
        .replace(/^\.\//, '../')
        .replace(/^\.\.\//, '../../');
    }

    // OG画像・BlogPosting構造化データを動的更新
    const imgAbsUrl = imgSrc
      ? 'https://yoshizuka-goen.com/' + imgSrc.replace(/^\.\.\/\.\.\//, '')
      : 'https://yoshizuka-goen.com/images/hero-goen.jpg';
    document.querySelector('meta[property="og:image"]')?.setAttribute('content', imgAbsUrl);
    const ldEl = document.createElement('script');
    ldEl.type = 'application/ld+json';
    ldEl.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": post.title,
      "description": post.excerpt || '',
      "datePublished": post.date || '',
      "image": imgAbsUrl,
      "url": pageUrl,
      "author": {"@type": "Organization", "name": "吉塚 ごえん"},
      "publisher": {"@type": "Organization", "name": "吉塚 ごえん", "url": "https://yoshizuka-goen.com/"},
      "mainEntityOfPage": {"@type": "WebPage", "@id": pageUrl}
    });
    document.head.appendChild(ldEl);

    const imgHtml = imgSrc
      ? `<img src="${esc(imgSrc)}" alt="${esc(post.title)}" class="post-hero" loading="lazy">`
      : '';

    const rawBody = post.body || `<p>${esc(post.excerpt)}</p>`;
    const bodyHtml = (typeof marked !== "undefined" && !rawBody.trimStart().startsWith("<"))
      ? marked.parse(rawBody)
      : rawBody;

    contentEl.innerHTML = `
      <p class="post-date">${fmtDate(post.date)}</p>
      <h1 class="post-title">${esc(post.title)}</h1>
      ${imgHtml}
      <div class="post-body">${bodyHtml}</div>
      <div class="post-footer">
        <a href="../">← ブログ一覧へ戻る</a>
        <span>|</span>
        <a href="../../">トップへ</a>
      </div>
    `;

  } catch(e) {
    contentEl.innerHTML = `<p>エラー：${esc(e.message)}<br><a href="../" style="text-decoration:underline">ブログ一覧へ</a></p>`;
    console.error(e);
  }
})();
</script>

</body>
</html>
